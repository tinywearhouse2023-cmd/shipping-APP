<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>出貨掃描系統</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
--primary: #2563eb;
--primary-dark: #1d4ed8;
--success: #16a34a;
--danger: #dc2626;
--warn: #d97706;
--bg: #f1f5f9;
--card: #ffffff;
--text: #0f172a;
--muted: #64748b;
--border: #e2e8f0;
--radius: 16px;
}

body {
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
background: var(--bg);
color: var(--text);
min-height: 100vh;
padding-bottom: 40px;
}

/* ── Header ── */
.header {
background: var(--primary);
color: white;
padding: 20px 20px 16px;
display: flex;
align-items: center;
gap: 12px;
}
.header-icon { font-size: 28px; }
.header h1 { font-size: 20px; font-weight: 700; }
.header p { font-size: 13px; opacity: 0.8; margin-top: 2px; }

/* ── Screen ── */
.screen { display: none; padding: 20px; }
.screen.active { display: block; }

/* ── Card ── */
.card {
background: var(--card);
border-radius: var(--radius);
padding: 20px;
margin-bottom: 16px;
box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.card-title {
font-size: 13px;
font-weight: 600;
color: var(--muted);
text-transform: uppercase;
letter-spacing: .05em;
margin-bottom: 14px;
}

/* ── Buttons ── */
.btn {
display: block;
width: 100%;
padding: 15px;
border: none;
border-radius: 12px;
font-size: 16px;
font-weight: 600;
cursor: pointer;
transition: opacity .15s, transform .1s;
text-align: center;
}
.btn:active { opacity: .85; transform: scale(.98); }
.btn-primary { background: var(--primary); color: white; }
.btn-success { background: var(--success); color: white; }
.btn-danger { background: var(--danger); color: white; }
.btn-outline {
background: transparent;
border: 2px solid var(--border);
color: var(--text);
}
.btn + .btn { margin-top: 10px; }

/* ── User List ── */
.user-item {
display: flex;
align-items: center;
justify-content: space-between;
padding: 14px 16px;
border: 2px solid var(--border);
border-radius: 12px;
margin-bottom: 10px;
cursor: pointer;
transition: border-color .15s, background .15s;
}
.user-item:hover, .user-item.selected {
border-color: var(--primary);
background: #eff6ff;
}
.user-avatar {
width: 40px; height: 40px;
border-radius: 50%;
background: var(--primary);
color: white;
font-size: 18px;
font-weight: 700;
display: flex; align-items: center; justify-content: center;
margin-right: 12px;
flex-shrink: 0;
}
.user-name { font-size: 16px; font-weight: 600; }
.user-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.user-del {
background: none; border: none;
color: var(--danger); font-size: 20px;
cursor: pointer; padding: 4px 8px;
}

/* ── Input ── */
.input-row { display: flex; gap: 10px; margin-top: 12px; }
input[type="text"] {
flex: 1;
padding: 13px 14px;
border: 2px solid var(--border);
border-radius: 12px;
font-size: 15px;
outline: none;
transition: border-color .15s;
}
input[type="text"]:focus { border-color: var(--primary); }
.input-btn {
padding: 13px 18px;
background: var(--primary);
color: white;
border: none;
border-radius: 12px;
font-size: 15px;
font-weight: 600;
cursor: pointer;
}

/* ── QR Scanner ── */
#qr-video-wrap {
position: relative;
border-radius: 14px;
overflow: hidden;
background: #000;
aspect-ratio: 1;
margin-bottom: 16px;
}
#qr-video { width: 100%; height: 100%; object-fit: cover; display: block; }
.scan-overlay {
position: absolute; inset: 0;
display: flex; align-items: center; justify-content: center;
pointer-events: none;
}
.scan-frame {
width: 60%; aspect-ratio: 1;
border: 3px solid white;
border-radius: 12px;
box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
}
.scan-line {
position: absolute;
width: 60%;
height: 2px;
background: #22d3ee;
animation: scanAnim 2s linear infinite;
box-shadow: 0 0 8px #22d3ee;
}
@keyframes scanAnim {
0% { top: 20%; }
100% { top: 80%; }
}

/* ── QR Result ── */
.qr-result {
background: #f0fdf4;
border: 2px solid #86efac;
border-radius: 12px;
padding: 14px 16px;
margin-bottom: 14px;
display: none;
}
.qr-result.show { display: block; }
.qr-result-label { font-size: 12px; color: var(--success); font-weight: 600; margin-bottom: 4px; }
.qr-result-code { font-size: 16px; font-weight: 700; word-break: break-all; }

/* ── Info Row ── */
.info-row {
display: flex; justify-content: space-between;
padding: 10px 0;
border-bottom: 1px solid var(--border);
font-size: 14px;
}
.info-row:last-child { border-bottom: none; }
.info-label { color: var(--muted); }
.info-value { font-weight: 600; text-align: right; max-width: 60%; word-break: break-all; }

/* ── Video ── */
#rec-video-wrap {
border-radius: 14px; overflow: hidden;
background: #000; aspect-ratio: 16/9;
margin-bottom: 16px;
}
#rec-video { width: 100%; height: 100%; object-fit: cover; display: block; }
.rec-indicator {
display: inline-flex; align-items: center; gap: 6px;
background: var(--danger); color: white;
font-size: 13px; font-weight: 700;
padding: 5px 12px; border-radius: 20px;
margin-bottom: 12px;
display: none;
}
.rec-indicator.show { display: inline-flex; }
.rec-dot { width: 8px; height: 8px; border-radius: 50%; background: white; animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── Upload Progress ── */
.progress-wrap { margin-top: 16px; display: none; }
.progress-wrap.show { display: block; }
.progress-bar-bg {
height: 10px; background: var(--border); border-radius: 99px; overflow: hidden;
}
.progress-bar {
height: 100%; background: var(--primary); border-radius: 99px;
transition: width .3s;
width: 0%;
}
.progress-label { font-size: 13px; color: var(--muted); margin-top: 6px; text-align: center; }

/* ── Status Badge ── */
.badge {
display: inline-block;
padding: 4px 10px; border-radius: 20px;
font-size: 12px; font-weight: 700;
}
.badge-success { background: #dcfce7; color: var(--success); }
.badge-warn { background: #fef3c7; color: var(--warn); }

/* ── Toast ── */
#toast {
position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
background: #1e293b; color: white;
padding: 12px 22px; border-radius: 12px;
font-size: 14px; font-weight: 500;
opacity: 0; pointer-events: none;
transition: opacity .3s;
z-index: 9999;
white-space: nowrap;
max-width: 90vw;
}
#toast.show { opacity: 1; }

/* ── Nav ── */
.nav {
position: fixed; bottom: 0; left: 0; right: 0;
background: white;
border-top: 1px solid var(--border);
display: flex;
padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
flex: 1; padding: 12px 0; border: none; background: none;
display: flex; flex-direction: column; align-items: center; gap: 3px;
font-size: 10px; color: var(--muted); cursor: pointer;
transition: color .15s;
}
.nav-btn.active { color: var(--primary); }
.nav-btn span { font-size: 22px; }

/* ── API URL setup ── */
.api-warning {
background: #fef3c7; border: 2px solid #fcd34d;
border-radius: 12px; padding: 14px 16px; margin-bottom: 16px;
font-size: 13px; line-height: 1.6;
}
.api-warning strong { color: var(--warn); }
</style>
</head>
<body>

<div class="header">
<div class="header-icon">📦</div>
<div>
<h1>出貨掃描系統</h1>
<p id="header-user">請先選擇使用者</p>
</div>
</div>

<!-- ══════════════════════════════════════
Screen 1: 使用者選擇
════════════════════════════════════════ -->
<div class="screen active" id="screen-users">
<div class="card" style="margin-top:16px">
<div class="card-title">選擇使用者</div>
<div id="user-list"></div>
<div class="input-row">
<input type="text" id="new-user-input" placeholder="輸入新使用者名稱" />
<button class="input-btn" onclick="addUser()">＋新增</button>
</div>
</div>

<div class="card" id="api-setup-card">
<div class="card-title">⚙️ API 設定</div>
<div class="api-warning">
<strong>首次使用需設定</strong><br>
請填入你的 Google Apps Script 部署網址（Web App URL）
</div>
<input type="text" id="api-url-input" placeholder="https://script.google.com/macros/s/.../exec" style="margin-bottom:10px" />
<button class="btn btn-primary" onclick="saveApiUrl()">儲存 API 網址</button>
</div>

<button class="btn btn-primary" style="margin:0 0 80px"
onclick="goToScan()">開始掃描 →</button>
</div>

<!-- ══════════════════════════════════════
Screen 2: QR 掃描
════════════════════════════════════════ -->
<div class="screen" id="screen-scan">
<div style="margin-top:16px">
<div id="qr-video-wrap">
<video id="qr-video" autoplay playsinline muted></video>
<div class="scan-overlay">
<div class="scan-frame"></div>
<div class="scan-line"></div>
</div>
</div>

<div class="qr-result" id="qr-result">
<div class="qr-result-label">✅ 掃描成功</div>
<div class="qr-result-code" id="qr-code-display"></div>
</div>

<div class="card">
<div class="info-row">
<span class="info-label">使用者</span>
<span class="info-value" id="scan-user-display">—</span>
</div>
<div class="info-row">
<span class="info-label">貨物編號</span>
<span class="info-value" id="scan-qr-display">等待掃描…</span>
</div>
<div class="info-row">
<span class="info-label">時間</span>
<span class="info-value" id="scan-time-display">—</span>
</div>
</div>

<button class="btn btn-success" id="btn-confirm-scan" onclick="confirmScan()" disabled>
✅ 確認並前往錄影
</button>
<button class="btn btn-outline" onclick="resetScan()" style="margin-top:10px;margin-bottom:80px">
重新掃描
</button>
</div>
</div>

<!-- ══════════════════════════════════════
Screen 3: 錄影
════════════════════════════════════════ -->
<div class="screen" id="screen-record">
<div style="margin-top:16px">
<div class="rec-indicator" id="rec-indicator">
<div class="rec-dot"></div> 錄影中
</div>

<div id="rec-video-wrap">
<video id="rec-video" autoplay playsinline muted></video>
</div>

<div class="card">
<div class="info-row">
<span class="info-label">貨物編號</span>
<span class="info-value" id="rec-qr-display">—</span>
</div>
<div class="info-row">
<span class="info-label">錄影時長</span>
<span class="info-value" id="rec-timer">00:00</span>
</div>
</div>

<button class="btn btn-danger" id="btn-start-rec" onclick="startRecording()">
🔴 開始錄影
</button>
<button class="btn btn-primary" id="btn-stop-rec" onclick="stopRecording()" style="display:none">
⏹ 停止並上傳
</button>

<div class="progress-wrap" id="progress-wrap">
<div class="progress-bar-bg">
<div class="progress-bar" id="progress-bar"></div>
</div>
<div class="progress-label" id="progress-label">上傳中…</div>
</div>

<button class="btn btn-outline" onclick="cancelRecord()" style="margin-top:10px;margin-bottom:80px">
取消，重新掃描
</button>
</div>
</div>

<!-- ══════════════════════════════════════
Screen 4: 完成
════════════════════════════════════════ -->
<div class="screen" id="screen-done">
<div style="margin-top:40px; text-align:center; padding: 0 20px">
<div style="font-size:72px;margin-bottom:16px">✅</div>
<h2 style="font-size:24px;margin-bottom:8px">完成！</h2>
<p style="color:var(--muted);margin-bottom:32px">已記錄到 Google Sheet</p>

<div class="card" style="text-align:left">
<div class="info-row">
<span class="info-label">貨物編號</span>
<span class="info-value" id="done-qr">—</span>
</div>
<div class="info-row">
<span class="info-label">使用者</span>
<span class="info-value" id="done-user">—</span>
</div>
<div class="info-row">
<span class="info-label">時間</span>
<span class="info-value" id="done-time">—</span>
</div>
<div class="info-row">
<span class="info-label">影片</span>
<span class="info-value"><span class="badge badge-success">已上傳</span></span>
</div>
</div>

<button class="btn btn-primary" onclick="startOver()" style="margin-bottom:80px">
繼續下一包 →
</button>
</div>
</div>

<!-- Bottom Nav -->
<nav class="nav">
<button class="nav-btn active" id="nav-users" onclick="showScreen('users')">
<span>👤</span>使用者
</button>
<button class="nav-btn" id="nav-scan" onclick="showScreen('scan')">
<span>📷</span>掃描
</button>
<button class="nav-btn" id="nav-record" onclick="showScreen('record')">
<span>🎬</span>錄影
</button>
</nav>

<!-- Toast -->
<div id="toast"></div>

<script>
// ══════════════════════════════════════
// 狀態管理
// ══════════════════════════════════════
let state = {
currentUser: null,
scannedCode: null,
scannedTime: null,
currentRowId: null,
apiUrl: localStorage.getItem("apiUrl") || "",
};

// ══════════════════════════════════════
// Toast 通知
// ══════════════════════════════════════
function toast(msg, duration = 2500) {
const el = document.getElementById("toast");
el.textContent = msg;
el.classList.add("show");
setTimeout(() => el.classList.remove("show"), duration);
}

// ══════════════════════════════════════
// 畫面切換
// ══════════════════════════════════════
function showScreen(name) {
document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
document.getElementById("screen-" + name).classList.add("active");
document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
const navEl = document.getElementById("nav-" + name);
if (navEl) navEl.classList.add("active");

if (name === "scan") initQRScanner();
if (name === "record") initRecordCamera();
}

// ══════════════════════════════════════
// 使用者管理
// ══════════════════════════════════════
function getUsers() {
return JSON.parse(localStorage.getItem("users") || "[]");
}
function saveUsers(users) {
localStorage.setItem("users", JSON.stringify(users));
}

function renderUsers() {
const users = getUsers();
const list = document.getElementById("user-list");
list.innerHTML = "";
if (users.length === 0) {
list.innerHTML = '<p style="color:var(--muted);font-size:14px;margin-bottom:12px">尚無使用者，請新增</p>';
return;
}
users.forEach(u => {
const div = document.createElement("div");
div.className = "user-item" + (state.currentUser === u ? " selected" : "");
div.innerHTML = `
<div style="display:flex;align-items:center">
<div class="user-avatar">${u[0].toUpperCase()}</div>
<div>
<div class="user-name">${u}</div>
<div class="user-meta">${state.currentUser === u ? "✅ 目前使用中" : "點擊選擇"}</div>
</div>
</div>
<button class="user-del" onclick="deleteUser('${u}', event)">🗑</button>
`;
div.onclick = () => selectUser(u);
list.appendChild(div);
});
}

function selectUser(name) {
state.currentUser = name;
localStorage.setItem("currentUser", name);
document.getElementById("header-user").textContent = "使用者：" + name;
document.getElementById("scan-user-display").textContent = name;
renderUsers();
toast("已選擇：" + name);
}

function addUser() {
const input = document.getElementById("new-user-input");
const name = input.value.trim();
if (!name) return toast("請輸入使用者名稱");
const users = getUsers();
if (users.includes(name)) return toast("使用者已存在");
users.push(name);
saveUsers(users);
input.value = "";
renderUsers();
selectUser(name);
}

function deleteUser(name, e) {
e.stopPropagation();
if (!confirm(`確定刪除使用者「${name}」？`)) return;
let users = getUsers().filter(u => u !== name);
saveUsers(users);
if (state.currentUser === name) {
state.currentUser = null;
document.getElementById("header-user").textContent = "請先選擇使用者";
}
renderUsers();
}

function goToScan() {
if (!state.currentUser) return toast("⚠️ 請先選擇使用者");
if (!state.apiUrl) return toast("⚠️ 請先設定 API 網址");
showScreen("scan");
}

// ══════════════════════════════════════
// API 設定
// ══════════════════════════════════════
function saveApiUrl() {
const url = document.getElementById("api-url-input").value.trim();
if (!url.startsWith("https://")) return toast("請輸入正確的 https:// 網址");
state.apiUrl = url;
localStorage.setItem("apiUrl", url);
toast("✅ API 網址已儲存");
document.getElementById("api-setup-card").style.opacity = "0.5";
}

// ══════════════════════════════════════
// QR 掃描（使用 jsQR）
// ══════════════════════════════════════
let qrStream = null;
let qrInterval = null;
let qrDetected = false;

async function initQRScanner() {
qrDetected = false;
document.getElementById("qr-result").classList.remove("show");
document.getElementById("btn-confirm-scan").disabled = true;
document.getElementById("scan-qr-display").textContent = "等待掃描…";
document.getElementById("scan-time-display").textContent = "—";

// 動態載入 jsQR
if (!window.jsQR) {
await loadScript("https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js");
}

try {
if (qrStream) qrStream.getTracks().forEach(t => t.stop());
qrStream = await navigator.mediaDevices.getUserMedia({
video: { facingMode: "environment" }
});
const video = document.getElementById("qr-video");
video.srcObject = qrStream;
video.play();

clearInterval(qrInterval);
const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

qrInterval = setInterval(() => {
if (qrDetected) return;
if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;
ctx.drawImage(video, 0, 0);
const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
const code = jsQR(imageData.data, imageData.width, imageData.height);
if (code) {
qrDetected = true;
onQRDetected(code.data);
}
}, 300);
} catch (err) {
toast("無法開啟相機：" + err.message);
}
}

function onQRDetected(code) {
const now = new Date();
state.scannedCode = code;
state.scannedTime = now.toLocaleString("zh-TW");
state.currentRowId = "R" + Date.now();

document.getElementById("qr-result").classList.add("show");
document.getElementById("qr-code-display").textContent = code;
document.getElementById("scan-qr-display").textContent = code;
document.getElementById("scan-time-display").textContent = state.scannedTime;
document.getElementById("btn-confirm-scan").disabled = false;

// 震動回饋
if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
toast("✅ 條碼掃描成功！");
}

function resetScan() {
qrDetected = false;
document.getElementById("qr-result").classList.remove("show");
document.getElementById("btn-confirm-scan").disabled = true;
document.getElementById("scan-qr-display").textContent = "等待掃描…";
document.getElementById("scan-time-display").textContent = "—";
state.scannedCode = null;
}

async function confirmScan() {
if (!state.scannedCode) return;
toast("正在記錄到 Google Sheet…");

try {
const res = await fetch(state.apiUrl, {
method: "POST",
body: JSON.stringify({
action: "addRecord",
user: state.currentUser,
qrCode: state.scannedCode,
timestamp: state.scannedTime,
rowId: state.currentRowId,
}),
});
const data = await res.json();
if (!data.success) throw new Error(data.error);
toast("✅ 已記錄！前往錄影");
stopQRScanner();
showScreen("record");
document.getElementById("rec-qr-display").textContent = state.scannedCode;
} catch (err) {
toast("❌ 記錄失敗：" + err.message);
}
}

function stopQRScanner() {
clearInterval(qrInterval);
if (qrStream) { qrStream.getTracks().forEach(t => t.stop()); qrStream = null; }
}

// ══════════════════════════════════════
// 錄影
// ══════════════════════════════════════
let recStream = null;
let mediaRecorder = null;
let recChunks = [];
let recTimerInterval = null;
let recSeconds = 0;

async function initRecordCamera() {
try {
if (recStream) recStream.getTracks().forEach(t => t.stop());
recStream = await navigator.mediaDevices.getUserMedia({
video: { facingMode: "environment" },
audio: true,
});
document.getElementById("rec-video").srcObject = recStream;
document.getElementById("rec-video").play();
} catch (err) {
toast("無法開啟相機：" + err.message);
}
}

function startRecording() {
if (!recStream) return toast("相機未就緒");
recChunks = [];
recSeconds = 0;
document.getElementById("rec-timer").textContent = "00:00";

const mimeType = MediaRecorder.isTypeSupported("video/mp4")
? "video/mp4"
: MediaRecorder.isTypeSupported("video/webm;codecs=vp8")
? "video/webm;codecs=vp8"
: "video/webm";

mediaRecorder = new MediaRecorder(recStream, { mimeType });
mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
mediaRecorder.onstop = handleRecordingStop;
mediaRecorder.start(1000);

document.getElementById("btn-start-rec").style.display = "none";
document.getElementById("btn-stop-rec").style.display = "block";
document.getElementById("rec-indicator").classList.add("show");

recTimerInterval = setInterval(() => {
recSeconds++;
const m = String(Math.floor(recSeconds / 60)).padStart(2, "0");
const s = String(recSeconds % 60).padStart(2, "0");
document.getElementById("rec-timer").textContent = `${m}:${s}`;
}, 1000);
}

function stopRecording() {
clearInterval(recTimerInterval);
document.getElementById("rec-indicator").classList.remove("show");
document.getElementById("btn-stop-rec").style.display = "none";
if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
}

async function handleRecordingStop() {
const mimeType = recChunks[0]?.type || "video/mp4";
const ext = mimeType.includes("mp4") ? "mp4" : "webm";
const blob = new Blob(recChunks, { type: mimeType });

const progressWrap = document.getElementById("progress-wrap");
const progressBar = document.getElementById("progress-bar");
const progressLabel = document.getElementById("progress-label");
progressWrap.classList.add("show");
progressLabel.textContent = "轉換中…";
progressBar.style.width = "10%";

try {
// 分塊 base64 轉換（避免大檔案記憶體問題）
const arrayBuffer = await blob.arrayBuffer();
const bytes = new Uint8Array(arrayBuffer);
let binary = "";
const chunkSize = 8192;
for (let i = 0; i < bytes.length; i += chunkSize) {
binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
}
const base64 = btoa(binary);
progressBar.style.width = "40%";
progressLabel.textContent = "上傳中…（影片可能較大，請稍候）";

const res = await fetch(state.apiUrl, {
method: "POST",
body: JSON.stringify({
action: "uploadVideo",
videoBase64: base64,
mimeType: mimeType,
qrCode: state.scannedCode,
ext: ext,
rowId: state.currentRowId,
}),
});

progressBar.style.width = "90%";
const data = await res.json();
if (!data.success) throw new Error(data.error);

progressBar.style.width = "100%";
progressLabel.textContent = "✅ 上傳完成！";

// 更新完成畫面
document.getElementById("done-qr").textContent = state.scannedCode;
document.getElementById("done-user").textContent = state.currentUser;
document.getElementById("done-time").textContent = state.scannedTime;

setTimeout(() => {
stopRecordStream();
showScreen("done");
}, 800);

} catch (err) {
progressLabel.textContent = "❌ 上傳失敗：" + err.message;
toast("上傳失敗，請重試");
document.getElementById("btn-start-rec").style.display = "block";
}
}

function stopRecordStream() {
if (recStream) { recStream.getTracks().forEach(t => t.stop()); recStream = null; }
}

function cancelRecord() {
clearInterval(recTimerInterval);
if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
stopRecordStream();
document.getElementById("btn-start-rec").style.display = "block";
document.getElementById("btn-stop-rec").style.display = "none";
document.getElementById("rec-indicator").classList.remove("show");
document.getElementById("progress-wrap").classList.remove("show");
showScreen("scan");
resetScan();
initQRScanner();
}

function startOver() {
state.scannedCode = null;
state.scannedTime = null;
state.currentRowId = null;
document.getElementById("progress-wrap").classList.remove("show");
document.getElementById("progress-bar").style.width = "0%";
document.getElementById("btn-start-rec").style.display = "block";
document.getElementById("btn-stop-rec").style.display = "none";
showScreen("scan");
resetScan();
initQRScanner();
}

// ══════════════════════════════════════
// 工具
// ══════════════════════════════════════
function loadScript(src) {
return new Promise((resolve, reject) => {
const s = document.createElement("script");
s.src = src;
s.onload = resolve;
s.onerror = reject;
document.head.appendChild(s);
});
}

// ══════════════════════════════════════
// 初始化
// ══════════════════════════════════════
(function init() {
const savedUser = localStorage.getItem("currentUser");
if (savedUser) {
state.currentUser = savedUser;
document.getElementById("header-user").textContent = "使用者：" + savedUser;
document.getElementById("scan-user-display").textContent = savedUser;
}
if (state.apiUrl) {
document.getElementById("api-url-input").value = state.apiUrl;
document.getElementById("api-setup-card").style.opacity = "0.7";
}
renderUsers();
})();
</script>
