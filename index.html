<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>出貨掃描系統</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–primary: #2563eb;
–success: #16a34a;
–danger: #dc2626;
–warn: #d97706;
–bg: #f1f5f9;
–card: #ffffff;
–text: #0f172a;
–muted: #64748b;
–border: #e2e8f0;
–radius: 16px;
}

body {
font-family: -apple-system, BlinkMacSystemFont, “Segoe UI”, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
}

.header {
background: var(–primary);
color: white;
padding: 20px 20px 16px;
display: flex;
align-items: center;
gap: 12px;
}
.header-icon { font-size: 28px; }
.header h1 { font-size: 20px; font-weight: 700; }
.header p { font-size: 13px; opacity: 0.8; margin-top: 2px; }

.screen { display: none; padding: 20px; padding-bottom: 90px; }
.screen.active { display: block; }
#screen-record.active { display: block; padding: 0; }

.card {
background: var(–card);
border-radius: var(–radius);
padding: 20px;
margin-bottom: 16px;
box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.card-title {
font-size: 13px; font-weight: 600;
color: var(–muted); text-transform: uppercase;
letter-spacing: .05em; margin-bottom: 14px;
}

.btn {
display: block; width: 100%;
padding: 15px; border: none;
border-radius: 12px; font-size: 16px;
font-weight: 600; cursor: pointer;
transition: opacity .15s, transform .1s;
text-align: center;
}
.btn:active { opacity: .85; transform: scale(.98); }
.btn-primary { background: var(–primary); color: white; }
.btn-success { background: var(–success); color: white; }
.btn-outline {
background: transparent;
border: 2px solid var(–border); color: var(–text);
}
.btn + .btn { margin-top: 10px; }

.user-item {
display: flex; align-items: center;
justify-content: space-between;
padding: 14px 16px;
border: 2px solid var(–border);
border-radius: 12px; margin-bottom: 10px;
cursor: pointer;
transition: border-color .15s, background .15s;
}
.user-item:hover, .user-item.selected {
border-color: var(–primary); background: #eff6ff;
}
.user-avatar {
width: 40px; height: 40px; border-radius: 50%;
background: var(–primary); color: white;
font-size: 18px; font-weight: 700;
display: flex; align-items: center; justify-content: center;
margin-right: 12px; flex-shrink: 0;
}
.user-name { font-size: 16px; font-weight: 600; }
.user-meta { font-size: 12px; color: var(–muted); margin-top: 2px; }
.user-del {
background: none; border: none;
color: var(–danger); font-size: 20px;
cursor: pointer; padding: 4px 8px;
}

.input-row { display: flex; gap: 10px; margin-top: 12px; }
input[type=“text”] {
flex: 1; padding: 13px 14px;
border: 2px solid var(–border);
border-radius: 12px; font-size: 15px;
outline: none; transition: border-color .15s;
}
input[type=“text”]:focus { border-color: var(–primary); }
.input-btn {
padding: 13px 18px; background: var(–primary);
color: white; border: none; border-radius: 12px;
font-size: 15px; font-weight: 600; cursor: pointer;
}

#qr-video-wrap {
position: relative; border-radius: 14px;
overflow: hidden; background: #000;
aspect-ratio: 1; margin-bottom: 16px;
}
#qr-video { width: 100%; height: 100%; object-fit: cover; display: block; }
.scan-overlay {
position: absolute; inset: 0;
display: flex; align-items: center; justify-content: center;
pointer-events: none;
}
.scan-frame {
width: 60%; aspect-ratio: 1;
border: 3px solid white; border-radius: 12px;
box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
}
.scan-line {
position: absolute; width: 60%; height: 2px;
background: #22d3ee; animation: scanAnim 2s linear infinite;
box-shadow: 0 0 8px #22d3ee;
}
@keyframes scanAnim { 0%{top:20%} 100%{top:80%} }

.qr-result {
background: #f0fdf4; border: 2px solid #86efac;
border-radius: 12px; padding: 14px 16px;
margin-bottom: 14px; display: none;
}
.qr-result.show { display: block; }
.qr-result-label { font-size: 12px; color: var(–success); font-weight: 600; margin-bottom: 4px; }
.qr-result-code { font-size: 16px; font-weight: 700; word-break: break-all; }

.info-row {
display: flex; justify-content: space-between;
padding: 10px 0; border-bottom: 1px solid var(–border); font-size: 14px;
}
.info-row:last-child { border-bottom: none; }
.info-label { color: var(–muted); }
.info-value { font-weight: 600; text-align: right; max-width: 60%; word-break: break-all; }

/* 全螢幕錄影 */
#rec-fullscreen {
position: relative;
width: 100vw;
height: 100vh;
background: #000;
overflow: hidden;
}
#rec-video {
position: absolute; inset: 0;
width: 100%; height: 100%;
object-fit: cover;
}
#rec-ui {
position: absolute; inset: 0;
display: flex; flex-direction: column;
justify-content: space-between;
padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 30px);
z-index: 10;
}
#rec-top {
display: flex; align-items: center;
justify-content: space-between; padding-top: 10px;
}
.rec-indicator {
display: none; align-items: center; gap: 6px;
background: rgba(220,38,38,0.85); color: white;
font-size: 13px; font-weight: 700;
padding: 5px 12px; border-radius: 20px;
backdrop-filter: blur(4px);
}
.rec-indicator.show { display: flex; }
.rec-dot { width: 8px; height: 8px; border-radius: 50%; background: white; animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

#rec-timer-display {
color: white; font-size: 16px; font-weight: 700;
text-shadow: 0 1px 4px rgba(0,0,0,0.6);
}
#rec-qr-top {
color: white; font-size: 12px; font-weight: 600;
background: rgba(0,0,0,0.4); padding: 4px 10px;
border-radius: 20px; backdrop-filter: blur(4px);
max-width: 150px; overflow: hidden;
text-overflow: ellipsis; white-space: nowrap;
}
#rec-bottom {
display: flex; align-items: center;
justify-content: space-around; padding-bottom: 10px;
}
.flip-btn {
width: 56px; height: 56px; border-radius: 50%;
background: rgba(255,255,255,0.2);
border: 2px solid rgba(255,255,255,0.5);
color: white; font-size: 26px;
display: flex; align-items: center; justify-content: center;
cursor: pointer; backdrop-filter: blur(4px);
}
.flip-btn:active { background: rgba(255,255,255,0.4); }
.rec-shutter {
width: 84px; height: 84px; border-radius: 50%;
background: white; border: 4px solid rgba(255,255,255,0.5);
display: flex; align-items: center; justify-content: center;
cursor: pointer; transition: transform .1s;
box-shadow: 0 0 0 4px rgba(255,255,255,0.25);
}
.rec-shutter:active { transform: scale(.93); }
.rec-shutter-inner {
width: 58px; height: 58px; border-radius: 50%;
background: var(–danger);
transition: border-radius .2s, width .2s, height .2s;
}
.rec-shutter-inner.recording {
border-radius: 10px; width: 32px; height: 32px;
}
.cancel-btn {
width: 56px; height: 56px; border-radius: 50%;
background: rgba(255,255,255,0.2);
border: 2px solid rgba(255,255,255,0.5);
color: white; font-size: 13px; font-weight: 600;
display: flex; align-items: center; justify-content: center;
cursor: pointer; backdrop-filter: blur(4px);
}
.cancel-btn:active { background: rgba(255,255,255,0.4); }

/* 上傳佇列 */
#upload-queue-btn {
position: fixed; top: 16px; right: 16px;
background: var(–warn); color: white;
border: none; border-radius: 20px;
padding: 8px 14px; font-size: 13px; font-weight: 700;
cursor: pointer; z-index: 999;
display: none; align-items: center; gap: 6px;
box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
#upload-queue-btn.show { display: flex; }
#upload-panel {
position: fixed; inset: 0;
background: rgba(0,0,0,0.5);
z-index: 998; display: none; align-items: flex-end;
}
#upload-panel.show { display: flex; }
#upload-panel-inner {
background: white; width: 100%;
border-radius: 20px 20px 0 0;
padding: 20px; max-height: 60vh; overflow-y: auto;
}
#upload-panel-title {
font-size: 16px; font-weight: 700; margin-bottom: 16px;
display: flex; justify-content: space-between;
}
.upload-item {
display: flex; align-items: center; gap: 12px;
padding: 12px 0; border-bottom: 1px solid var(–border);
}
.upload-item:last-child { border-bottom: none; }
.upload-item-info { flex: 1; }
.upload-item-name { font-size: 14px; font-weight: 600; }
.upload-item-status { font-size: 12px; color: var(–muted); margin-top: 2px; }
.upload-item-bar {
height: 4px; background: var(–border);
border-radius: 99px; margin-top: 6px; overflow: hidden;
}
.upload-item-bar-fill {
height: 100%; background: var(–primary);
border-radius: 99px; transition: width .3s;
}
.upload-status-icon { font-size: 20px; }

.badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }

#toast {
position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
background: #1e293b; color: white;
padding: 12px 22px; border-radius: 12px;
font-size: 14px; font-weight: 500;
opacity: 0; pointer-events: none; transition: opacity .3s;
z-index: 9999; white-space: nowrap; max-width: 90vw;
}
#toast.show { opacity: 1; }

.nav {
position: fixed; bottom: 0; left: 0; right: 0;
background: white; border-top: 1px solid var(–border);
display: flex; padding-bottom: env(safe-area-inset-bottom);
z-index: 100;
}
.nav-btn {
flex: 1; padding: 12px 0; border: none; background: none;
display: flex; flex-direction: column; align-items: center; gap: 3px;
font-size: 10px; color: var(–muted); cursor: pointer;
}
.nav-btn.active { color: var(–primary); }
.nav-btn span { font-size: 22px; }

.api-warning {
background: #fef3c7; border: 2px solid #fcd34d;
border-radius: 12px; padding: 14px 16px; margin-bottom: 16px;
font-size: 13px; line-height: 1.6;
}
.api-warning strong { color: var(–warn); }
</style>

</head>

<nav class="nav" id="main-nav">
<button class="nav-btn active" id="nav-users" onclick="showScreen('users')"><span>👤</span>使用者</button>
<button class="nav-btn" id="nav-scan" onclick="showScreen('scan')"><span>📷</span>掃描</button>

<div id="toast"></div>

<script>
let state = {
currentUser: null,
scannedCode: null,
scannedTime: null,
currentRowId: null,
apiUrl: localStorage.getItem("apiUrl") || "",
facingMode: "environment",
};

let uploadQueue = [];

function toast(msg, duration = 2500) {
const el = document.getElementById("toast");
el.textContent = msg;
el.classList.add("show");
setTimeout(() => el.classList.remove("show"), duration);
}

function showScreen(name) {
document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
document.getElementById("screen-" + name).classList.add("active");
document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
const navEl = document.getElementById("nav-" + name);
if (navEl) navEl.classList.add("active");
document.getElementById("main-nav").style.display = name === "record" ? "none" : "flex";
if (name === "scan") initQRScanner();
if (name === "record") initRecordCamera();
}

function getUsers() { return JSON.parse(localStorage.getItem("users") || "[]"); }
function saveUsers(u) { localStorage.setItem("users", JSON.stringify(u)); }

function renderUsers() {
const users = getUsers();
const list = document.getElementById("user-list");
list.innerHTML = "";
if (!users.length) {
list.innerHTML = '<p style="color:var(--muted);font-size:14px;margin-bottom:12px">尚無使用者，請新增</p>';
return;
}
users.forEach(u => {
const div = document.createElement("div");
div.className = "user-item" + (state.currentUser === u ? " selected" : "");
div.innerHTML = `
<div style="display:flex;align-items:center">
<div class="user-avatar">${u[0].toUpperCase()}</div>
<div>
<div class="user-name">${u}</div>
<div class="user-meta">${state.currentUser === u ? "✅ 目前使用中" : "點擊選擇"}</div>
</div>
</div>
<button class="user-del" onclick="deleteUser('${u}',event)">🗑</button>`;
div.onclick = () => selectUser(u);
list.appendChild(div);
});
}

function selectUser(name) {
state.currentUser = name;
localStorage.setItem("currentUser", name);
document.getElementById("header-user").textContent = "使用者：" + name;
document.getElementById("scan-user-display").textContent = name;
renderUsers();
toast("已選擇：" + name);
}

function addUser() {
const input = document.getElementById("new-user-input");
const name = input.value.trim();
if (!name) return toast("請輸入使用者名稱");
const users = getUsers();
if (users.includes(name)) return toast("使用者已存在");
users.push(name);
saveUsers(users);
input.value = "";
renderUsers();
selectUser(name);
}

function deleteUser(name, e) {
e.stopPropagation();
if (!confirm(`確定刪除「${name}」？`)) return;
saveUsers(getUsers().filter(u => u !== name));
if (state.currentUser === name) {
state.currentUser = null;
document.getElementById("header-user").textContent = "請先選擇使用者";
}
renderUsers();
}

function goToScan() {
if (!state.currentUser) return toast("⚠️ 請先選擇使用者");
if (!state.apiUrl) return toast("⚠️ 請先設定 API 網址");
showScreen("scan");
}

function saveApiUrl() {
const url = document.getElementById("api-url-input").value.trim();
if (!url.startsWith("https://")) return toast("請輸入正確的 https:// 網址");
state.apiUrl = url;
localStorage.setItem("apiUrl", url);
toast("✅ API 網址已儲存");
document.getElementById("api-setup-card").style.opacity = "0.6";
}

let qrStream = null, qrInterval = null, qrDetected = false;

async function initQRScanner() {
qrDetected = false;
document.getElementById("qr-result").classList.remove("show");
document.getElementById("btn-confirm-scan").disabled = true;
document.getElementById("scan-qr-display").textContent = "等待掃描…";
document.getElementById("scan-time-display").textContent = "—";
if (!window.jsQR) await loadScript("https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js");
try {
if (qrStream) qrStream.getTracks().forEach(t => t.stop());
qrStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
const video = document.getElementById("qr-video");
video.srcObject = qrStream;
video.play();
clearInterval(qrInterval);
const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");
qrInterval = setInterval(() => {
if (qrDetected || video.readyState !== video.HAVE_ENOUGH_DATA) return;
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;
ctx.drawImage(video, 0, 0);
const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
if (code) { qrDetected = true; onQRDetected(code.data); }
}, 300);
} catch(err) { toast("無法開啟相機：" + err.message); }
}

function onQRDetected(code) {
state.scannedCode = code;
state.scannedTime = new Date().toLocaleString("zh-TW");
state.currentRowId = "R" + Date.now();
document.getElementById("qr-result").classList.add("show");
document.getElementById("qr-code-display").textContent = code;
document.getElementById("scan-qr-display").textContent = code;
document.getElementById("scan-time-display").textContent = state.scannedTime;
document.getElementById("btn-confirm-scan").disabled = false;
if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
toast("✅ 條碼掃描成功！");
}

function resetScan() {
qrDetected = false;
document.getElementById("qr-result").classList.remove("show");
document.getElementById("btn-confirm-scan").disabled = true;
document.getElementById("scan-qr-display").textContent = "等待掃描…";
document.getElementById("scan-time-display").textContent = "—";
state.scannedCode = null;
}

async function confirmScan() {
if (!state.scannedCode) return;
toast("正在記錄到 Google Sheet…");
try {
const res = await fetch(state.apiUrl, {
method: "POST",
body: JSON.stringify({
action: "addRecord",
user: state.currentUser,
qrCode: state.scannedCode,
timestamp: state.scannedTime,
rowId: state.currentRowId,
}),
});
const data = await res.json();
if (!data.success) throw new Error(data.error);
toast("✅ 已記錄！前往錄影");
stopQRScanner();
showScreen("record");
document.getElementById("rec-qr-top").textContent = state.scannedCode;
} catch(err) { toast("❌ 記錄失敗：" + err.message); }
}

function stopQRScanner() {
clearInterval(qrInterval);
if (qrStream) { qrStream.getTracks().forEach(t => t.stop()); qrStream = null; }
}

let recStream = null, mediaRecorder = null, recChunks = [];
let recTimerInterval = null, recSeconds = 0, isRecording = false;

async function initRecordCamera() {
try {
if (recStream) recStream.getTracks().forEach(t => t.stop());
recStream = await navigator.mediaDevices.getUserMedia({
video: { facingMode: state.facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
audio: true,
});
const video = document.getElementById("rec-video");
video.srcObject = recStream;
video.play();
} catch(err) { toast("無法開啟相機：" + err.message); }
}

async function flipCamera() {
state.facingMode = state.facingMode === "environment" ? "user" : "environment";
await initRecordCamera();
toast(state.facingMode === "environment" ? "後鏡頭" : "前鏡頭");
}

function toggleRecording() {
if (!isRecording) startRecording();
else stopRecording();
}

function startRecording() {
if (!recStream) return toast("相機未就緒");
recChunks = []; recSeconds = 0; isRecording = true;
document.getElementById("rec-timer-display").textContent = "00:00";
const mimeType = MediaRecorder.isTypeSupported("video/mp4") ? "video/mp4"
: MediaRecorder.isTypeSupported("video/webm;codecs=vp8") ? "video/webm;codecs=vp8"
: "video/webm";
mediaRecorder = new MediaRecorder(recStream, { mimeType });
mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
mediaRecorder.onstop = handleRecordingStop;
mediaRecorder.start(1000);
document.getElementById("rec-indicator").classList.add("show");
document.getElementById("rec-shutter-inner").classList.add("recording");
recTimerInterval = setInterval(() => {
recSeconds++;
const m = String(Math.floor(recSeconds/60)).padStart(2,"0");
const s = String(recSeconds%60).padStart(2,"0");
document.getElementById("rec-timer-display").textContent = `${m}:${s}`;
}, 1000);
}

function stopRecording() {
isRecording = false;
clearInterval(recTimerInterval);
document.getElementById("rec-indicator").classList.remove("show");
document.getElementById("rec-shutter-inner").classList.remove("recording");
if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
}

function handleRecordingStop() {
const mimeType = recChunks[0]?.type || "video/mp4";
const ext = mimeType.includes("mp4") ? "mp4" : "webm";
const blob = new Blob(recChunks, { type: mimeType });

const job = {
id: state.currentRowId,
qrCode: state.scannedCode,
status: "uploading",
progress: 0,
blob, mimeType, ext,
};
uploadQueue.push(job);
updateUploadQueueUI();
uploadInBackground(job);

document.getElementById("done-qr").textContent = state.scannedCode;
document.getElementById("done-user").textContent = state.currentUser;
document.getElementById("done-time").textContent = state.scannedTime;
const badge = document.getElementById("done-video-badge");
badge.textContent = "上傳中…";
badge.style.background = "#fef3c7";
badge.style.color = "#d97706";

stopRecordStream();
showScreen("done");
}

async function uploadInBackground(job) {
try {
job.progress = 10; updateUploadQueueUI();
const arrayBuffer = await job.blob.arrayBuffer();
const bytes = new Uint8Array(arrayBuffer);
let binary = "";
const chunkSize = 8192;
for (let i = 0; i < bytes.length; i += chunkSize)
binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
const base64 = btoa(binary);
job.progress = 40; updateUploadQueueUI();

const res = await fetch(state.apiUrl, {
method: "POST",
body: JSON.stringify({
action: "uploadVideo",
videoBase64: base64,
mimeType: job.mimeType,
qrCode: job.qrCode,
ext: job.ext,
rowId: job.id,
}),
});
job.progress = 90; updateUploadQueueUI();
const data = await res.json();
if (!data.success) throw new Error(data.error);

job.status = "done"; job.progress = 100;
updateUploadQueueUI();
toast("✅ " + job.qrCode + " 上傳完成！");

if (document.getElementById("done-qr").textContent === job.qrCode) {
const badge = document.getElementById("done-video-badge");
badge.textContent = "已上傳 ✅";
badge.style.background = "#dcfce7";
badge.style.color = "#16a34a";
}
} catch(err) {
job.status = "error"; updateUploadQueueUI();
toast("❌ " + job.qrCode + " 上傳失敗");
}
}

function updateUploadQueueUI() {
const active = uploadQueue.filter(j => j.status === "uploading");
const btn = document.getElementById("upload-queue-btn");
document.getElementById("upload-queue-count").textContent = active.length;
btn.classList.toggle("show", uploadQueue.length > 0);

const list = document.getElementById("upload-list");
list.innerHTML = "";
[...uploadQueue].reverse().forEach(job => {
const icon = job.status === "done" ? "✅" : job.status === "error" ? "❌" : "⬆️";
const statusText = job.status === "done" ? "上傳完成"
: job.status === "error" ? "上傳失敗"
: `上傳中 ${job.progress}%`;
const div = document.createElement("div");
div.className = "upload-item";
div.innerHTML = `
<div class="upload-status-icon">${icon}</div>
<div class="upload-item-info">
<div class="upload-item-name">${job.qrCode}</div>
<div class="upload-item-status">${statusText}</div>
${job.status === "uploading" ? `<div class="upload-item-bar"><div class="upload-item-bar-fill" style="width:${job.progress}%"></div></div>` : ""}
</div>`;
list.appendChild(div);
});
}

function toggleUploadPanel() {
document.getElementById("upload-panel").classList.toggle("show");
}
function closeUploadPanel(e) {
if (e.target === document.getElementById("upload-panel")) toggleUploadPanel();
}

function stopRecordStream() {
if (recStream) { recStream.getTracks().forEach(t => t.stop()); recStream = null; }
}

function cancelRecord() {
if (isRecording) stopRecording();
else stopRecordStream();
document.getElementById("rec-indicator").classList.remove("show");
document.getElementById("rec-shutter-inner").classList.remove("recording");
showScreen("scan");
resetScan();
initQRScanner();
}

function startOver() {
state.scannedCode = null;
state.scannedTime = null;
state.currentRowId = null;
showScreen("scan");
resetScan();
initQRScanner();
}

function loadScript(src) {
return new Promise((res, rej) => {
const s = document.createElement("script");
s.src = src; s.onload = res; s.onerror = rej;
document.head.appendChild(s);
});
}

(function init() {
const savedUser = localStorage.getItem("currentUser");
if (savedUser) {
state.currentUser = savedUser;
document.getElementById("header-user").textContent = "使用者：" + savedUser;
document.getElementById("scan-user-display").textContent = savedUser;
}
if (state.apiUrl) {
document.getElementById("api-url-input").value = state.apiUrl;
document.getElementById("api-setup-card").style.opacity = "0.6";
}
renderUsers();
})();
</script>

</body>
