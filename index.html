<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Tiny出貨" />
<link rel="apple-touch-icon" href="icon.png" />
<link rel="icon" type="image/png" href="icon.png" />
<title>Tiny出貨系統</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
--primary: #3d1a0e;
--primary-dark: #2a1009;
--primary-light: #6b3124;
--success: #4a7c59;
--danger: #9b2c2c;
--warn: #92622a;
--bg: #faf7f4;
--card: #ffffff;
--text: #2c1a0e;
--muted: #8a7060;
--border: #e8ddd6;
--radius: 16px;
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header { background: linear-gradient(135deg, #3d1a0e, #6b3124); color: white; padding: 20px 20px 16px; display: flex; align-items: center; gap: 14px; }
.header-logo { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; background: rgba(255,255,255,0.2); }
.header h1 { font-size: 20px; font-weight: 700; }
.header p { font-size: 13px; opacity: 0.85; margin-top: 2px; }

.screen { display: none; padding: 16px; padding-bottom: 90px; }
.screen.active { display: block; }
#screen-record.active { display: block; padding: 0; }

.card { background: var(–card); border-radius: var(–radius); padding: 20px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(61,26,14,0.08); border: 1px solid rgba(61,26,14,0.08); }
.card-title { font-size: 12px; font-weight: 700; color: var(–primary); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 14px; }

/* Buttons - much more visible */
.btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 17px; font-weight: 700; cursor: pointer; transition: opacity .15s, transform .1s; text-align: center; letter-spacing: 0.01em; }
.btn:active { opacity: .85; transform: scale(.98); }
.btn-primary { background: linear-gradient(135deg, #3d1a0e, #6b3124); color: white; box-shadow: 0 4px 14px rgba(61,26,14,0.35); }
.btn-success { background: linear-gradient(135deg, #4a7c59, #5a9a6e); color: white; box-shadow: 0 4px 14px rgba(74,124,89,0.35); }
.btn-danger { background: linear-gradient(135deg, #9b2c2c, #c53030); color: white; box-shadow: 0 4px 14px rgba(155,44,44,0.3); }
.btn-outline { background: white; border: 2px solid #d1d5db; color: #374151; font-weight: 600; }
.btn + .btn { margin-top: 12px; }
.btn:disabled { opacity: 0.4; box-shadow: none; }

/* User list */
.user-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border: 2px solid var(–border); border-radius: 14px; margin-bottom: 10px; cursor: pointer; transition: all .2s; }
.user-item.selected { border-color: var(–primary); background: #f5ede8; box-shadow: 0 0 0 3px rgba(61,26,14,0.12); }
.user-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #3d1a0e, #6b3124); color: white; font-size: 18px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-right: 12px; flex-shrink: 0; }
.user-name { font-size: 16px; font-weight: 700; color: var(–text); }
.user-meta { font-size: 12px; color: var(–muted); margin-top: 2px; }
.user-del { background: #fee2e2; border: none; color: var(–danger); font-size: 16px; cursor: pointer; padding: 6px 10px; border-radius: 8px; }

.input-row { display: flex; gap: 10px; margin-top: 12px; }
input[type=“text”] { flex: 1; padding: 14px; border: 2px solid var(–border); border-radius: 12px; font-size: 15px; outline: none; transition: border-color .15s; background: #fafafa; }
input[type=“text”]:focus { border-color: var(–primary); background: white; }
.input-btn { padding: 14px 18px; background: var(–primary); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; }

/* QR Scanner */
#qr-video-wrap { position: relative; border-radius: 16px; overflow: hidden; background: #000; aspect-ratio: 1; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
#qr-video { width: 100%; height: 100%; object-fit: cover; display: block; }
.scan-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.scan-frame { width: 62%; aspect-ratio: 1; border: 3px solid white; border-radius: 16px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5); }
.scan-line { position: absolute; width: 62%; height: 3px; background: linear-gradient(90deg, transparent, #a78bfa, transparent); animation: scanAnim 2s linear infinite; }
@keyframes scanAnim { 0%{top:19%} 100%{top:81%} }

.qr-result { background: #ecfdf5; border: 2px solid #6ee7b7; border-radius: 14px; padding: 14px 16px; margin-bottom: 14px; display: none; }
.qr-result.show { display: block; }
.qr-result-label { font-size: 12px; color: var(–success); font-weight: 700; margin-bottom: 4px; }
.qr-result-code { font-size: 17px; font-weight: 800; word-break: break-all; color: #065f46; }

.info-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f3f4f6; font-size: 14px; }
.info-row:last-child { border-bottom: none; }
.info-label { color: var(–muted); font-weight: 500; }
.info-value { font-weight: 700; text-align: right; max-width: 60%; word-break: break-all; color: var(–text); }

/* Fullscreen Record */
#rec-fullscreen { position: relative; width: 100vw; height: 100vh; background: #000; overflow: hidden; }
#rec-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
#rec-ui { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 30px); z-index: 10; }
#rec-top { display: flex; align-items: center; justify-content: space-between; padding-top: 10px; }
.rec-indicator { display: none; align-items: center; gap: 6px; background: rgba(220,38,38,0.9); color: white; font-size: 13px; font-weight: 700; padding: 6px 14px; border-radius: 20px; backdrop-filter: blur(8px); }
.rec-indicator.show { display: flex; }
.rec-dot { width: 8px; height: 8px; border-radius: 50%; background: white; animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
#rec-timer-display { color: white; font-size: 18px; font-weight: 800; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
#rec-qr-top { color: white; font-size: 12px; font-weight: 600; background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 20px; backdrop-filter: blur(8px); max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

#rec-settings { display: flex; justify-content: center; gap: 8px; padding: 8px 0; }
.setting-btn { background: rgba(0,0,0,0.5); border: 1.5px solid rgba(255,255,255,0.4); color: white; border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 700; cursor: pointer; backdrop-filter: blur(8px); transition: all .2s; }
.setting-btn.active { background: rgba(61,26,14,0.85); border-color: #a0694a; }

#rec-bottom { display: flex; align-items: center; justify-content: space-around; padding-bottom: 10px; }
.flip-btn { width: 58px; height: 58px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.6); color: white; font-size: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(8px); transition: background .2s; }
.flip-btn:active { background: rgba(255,255,255,0.35); }
.rec-shutter { width: 86px; height: 86px; border-radius: 50%; background: white; border: 5px solid rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform .1s; box-shadow: 0 0 0 4px rgba(255,255,255,0.3), 0 4px 20px rgba(0,0,0,0.4); }
.rec-shutter:active { transform: scale(.92); }
.rec-shutter-inner { width: 60px; height: 60px; border-radius: 50%; background: var(–danger); transition: border-radius .25s, width .25s, height .25s; }
.rec-shutter-inner.recording { border-radius: 10px; width: 34px; height: 34px; }
.cancel-btn { width: 58px; height: 58px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.6); color: white; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(8px); }
.cancel-btn:active { background: rgba(255,255,255,0.35); }

/* Upload queue */
#upload-queue-btn { position: fixed; top: 14px; right: 14px; background: linear-gradient(135deg, #92622a, #b8832e); color: white; border: none; border-radius: 20px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; z-index: 999; display: none; align-items: center; gap: 6px; box-shadow: 0 3px 10px rgba(146,98,42,0.4); }
#upload-queue-btn.show { display: flex; }
#upload-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 998; display: none; align-items: flex-end; backdrop-filter: blur(4px); }
#upload-panel.show { display: flex; }
#upload-panel-inner { background: white; width: 100%; border-radius: 24px 24px 0 0; padding: 24px; max-height: 65vh; overflow-y: auto; }
#upload-panel-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; color: var(–text); }
.upload-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid #f3f4f6; }
.upload-item:last-child { border-bottom: none; }
.upload-item-info { flex: 1; }
.upload-item-name { font-size: 15px; font-weight: 700; color: var(–text); }
.upload-item-status { font-size: 12px; color: var(–muted); margin-top: 3px; }
.upload-item-bar { height: 5px; background: #e5e7eb; border-radius: 99px; margin-top: 7px; overflow: hidden; }
.upload-item-bar-fill { height: 100%; background: linear-gradient(90deg, #3d1a0e, #6b3124); border-radius: 99px; transition: width .3s; }
.upload-status-icon { font-size: 22px; }

.badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; }

/* API設定 - 隱藏在進階設定裡 */
#api-section { margin-top: 8px; }
.advanced-toggle { background: none; border: none; color: var(–muted); font-size: 13px; cursor: pointer; padding: 8px 0; display: flex; align-items: center; gap: 4px; }
#api-fields { display: none; margin-top: 12px; }
#api-fields.show { display: block; }
.api-saved-badge { background: #ecfdf5; border: 1.5px solid #6ee7b7; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #065f46; font-weight: 600; margin-top: 8px; display: none; }
.api-saved-badge.show { display: block; }

#toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #2c1a0e; color: white; padding: 12px 24px; border-radius: 14px; font-size: 14px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 9999; white-space: nowrap; max-width: 90vw; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
#toast.show { opacity: 1; }

.nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #f0e8e2; display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 100; box-shadow: 0 -4px 20px rgba(61,26,14,0.08); }
.nav-btn { flex: 1; padding: 12px 0; border: none; background: none; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; color: var(–muted); cursor: pointer; font-weight: 500; }
.nav-btn.active { color: var(–primary); }.nav-btn span { font-size: 22px; }

.section-label { font-size: 13px; font-weight: 700; color: var(–muted); margin: 16px 0 8px; text-transform: uppercase; letter-spacing: .06em; }
</style>

</head>
<body>

<div class="header">
<img class="header-logo" src="icon.png" alt="Logo" onerror="this.style.display='none';document.querySelector('.header-icon-fallback').style.display='block'" />
<span class="header-icon-fallback" style="display:none;font-size:32px">📦</span>
<div>
<h1>Tiny 出貨系統</h1>
<p id="header-user">請先選擇使用者</p>
</div>
</div>

<button id="upload-queue-btn" onclick="toggleUploadPanel()">
⬆️ <span id="upload-queue-count">0</span> 個上傳中
</button>

<div id="upload-panel" onclick="closeUploadPanel(event)">
<div id="upload-panel-inner">
<div id="upload-panel-title">
<span>上傳佇列</span>
<button onclick="toggleUploadPanel()" style="background:#f3f4f6;border:none;font-size:16px;cursor:pointer;padding:6px 10px;border-radius:8px">✕</button>
</div>
<div id="upload-list"></div>
</div>
</div>

<!-- ══ Screen 1: 使用者 ══ -->

<div class="screen active" id="screen-users">
<div class="card" style="margin-top:16px">
<div class="card-title">👤 使用者</div>
<div id="user-list"></div>
<div class="input-row">
<input type="text" id="new-user-input" placeholder="新增使用者名稱" />
<button class="input-btn" onclick="addUser()">＋</button>
</div>
</div>

<!-- API 設定隱藏在進階 -->

<div id="api-section">
<button class="advanced-toggle" onclick="toggleApiFields()">⚙️ 進階設定 <span id="api-toggle-arrow">▼</span></button>
<div id="api-fields">
<div class="card">
<div class="card-title">API 設定</div>
<div class="api-saved-badge" id="api-saved-badge">✅ API 已設定完成</div>
<input type="text" id="api-url-input" placeholder="https://script.google.com/macros/s/.../exec" style="margin-bottom:10px;display:none" />
<button class="btn btn-primary" id="api-save-btn" onclick="saveApiUrl()" style="display:none">儲存 API 網址</button>
<button class="btn btn-outline" id="api-change-btn" onclick="showApiInput()" style="margin-top:8px;font-size:14px;padding:10px">更換 API 網址</button>
</div>
</div>
</div>

<div style="margin-top:8px">
<button class="btn btn-primary" onclick="goToScan()">開始出貨掃描 →</button>
</div>
</div>

<!-- ══ Screen 2: QR 掃描 ══ -->

<div class="screen" id="screen-scan">
<div style="margin-top:16px">
<div id="qr-video-wrap">
<video id="qr-video" autoplay playsinline muted></video>
<div class="scan-overlay">
<div class="scan-frame"></div>
<div class="scan-line"></div>
</div>
</div>
<div class="qr-result" id="qr-result">
<div class="qr-result-label">✅ 掃描成功</div>
<div class="qr-result-code" id="qr-code-display"></div>
</div>
<div class="card">
<div class="info-row"><span class="info-label">使用者</span><span class="info-value" id="scan-user-display">—</span></div>
<div class="info-row"><span class="info-label">貨物編號</span><span class="info-value" id="scan-qr-display">等待掃描…</span></div>
<div class="info-row"><span class="info-label">時間</span><span class="info-value" id="scan-time-display">—</span></div>
</div>
<button class="btn btn-success" id="btn-confirm-scan" onclick="confirmScan()" disabled>✅ 確認並前往錄影</button>
<button class="btn btn-outline" onclick="resetScan()" style="margin-top:12px;margin-bottom:80px">🔄 重新掃描</button>
</div>
</div>

<!-- ══ Screen 3: 全螢幕錄影 ══ -->

<div class="screen" id="screen-record">
<div id="rec-fullscreen">
<video id="rec-video" autoplay playsinline muted></video>
<div id="rec-ui">
<div id="rec-top">
<div class="rec-indicator" id="rec-indicator"><div class="rec-dot"></div> 錄影中</div>
<div id="rec-timer-display">00:00</div>
<div id="rec-qr-top">—</div>
</div>
<div id="rec-settings">
<button class="setting-btn active" id="btn-720p" onclick="setQuality('720p')">720p</button>
<button class="setting-btn" id="btn-1080p" onclick="setQuality('1080p')">1080p</button>
<button class="setting-btn active" id="btn-30fps" onclick="setFps(30)">30fps</button>
<button class="setting-btn" id="btn-60fps" onclick="setFps(60)">60fps</button>
</div>
<div id="rec-bottom">
<div class="cancel-btn" onclick="cancelRecord()">取消</div>
<div class="rec-shutter" onclick="toggleRecording()">
<div class="rec-shutter-inner" id="rec-shutter-inner"></div>
</div>
<div class="flip-btn" onclick="flipCamera()">🔄</div>
</div>
</div>
</div>
</div>

<!-- ══ Screen 4: 完成 ══ -->

<div class="screen" id="screen-done">
<div style="margin-top:50px; text-align:center; padding: 0 20px">
<div style="font-size:80px;margin-bottom:16px">✅</div>
<h2 style="font-size:26px;margin-bottom:8px;color:var(--text)">已記錄！</h2>
<p style="color:var(--muted);margin-bottom:4px;font-size:15px">影片上傳在背景進行</p>
<p style="color:var(--muted);font-size:13px;margin-bottom:28px">點右上角橘色按鈕查看進度</p>
<div class="card" style="text-align:left">
<div class="info-row"><span class="info-label">貨物編號</span><span class="info-value" id="done-qr">—</span></div>
<div class="info-row"><span class="info-label">使用者</span><span class="info-value" id="done-user">—</span></div>
<div class="info-row"><span class="info-label">時間</span><span class="info-value" id="done-time">—</span></div>
<div class="info-row">
<span class="info-label">影片</span>
<span class="info-value"><span class="badge" id="done-video-badge" style="background:#fef3c7;color:#92400e">⏳ 上傳中</span></span>
</div>
</div>
<button class="btn btn-primary" onclick="startOver()" style="margin-top:8px;margin-bottom:80px">繼續下一包 →</button>
</div>
</div>

<nav class="nav" id="main-nav">
<button class="nav-btn active" id="nav-users" onclick="showScreen('users')"><span>👤</span>使用者</button>
<button class="nav-btn" id="nav-scan" onclick="showScreen('scan')"><span>📷</span>掃描</button>
<button class="nav-btn" id="nav-record" onclick="showScreen('record')"><span>🎬</span>錄影</button>
</nav>
<div id="toast"></div>

<script>
let state = {
currentUser: localStorage.getItem("currentUser") || null,
scannedCode: null, scannedTime: null, currentRowId: null,
apiUrl: localStorage.getItem("apiUrl") || "",
facingMode: "environment", quality: "720p", fps: 30,
};
let uploadQueue = [];

function toast(msg, duration = 3000) {
const el = document.getElementById("toast");
el.textContent = msg; el.classList.add("show");
setTimeout(() => el.classList.remove("show"), duration);
}

function showScreen(name) {
document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
document.getElementById("screen-" + name).classList.add("active");
document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
const navEl = document.getElementById("nav-" + name);
if (navEl) navEl.classList.add("active");
document.getElementById("main-nav").style.display = name === "record" ? "none" : "flex";
if (name === "scan") initQRScanner();
if (name === "record") initRecordCamera();
}

// ══ API 設定 UI ══
function toggleApiFields() {
const fields = document.getElementById("api-fields");
const arrow = document.getElementById("api-toggle-arrow");
fields.classList.toggle("show");
arrow.textContent = fields.classList.contains("show") ? "▲" : "▼";
}

function showApiInput() {
document.getElementById("api-url-input").style.display = "block";
document.getElementById("api-save-btn").style.display = "block";
document.getElementById("api-change-btn").style.display = "none";
document.getElementById("api-url-input").value = state.apiUrl;
}

function saveApiUrl() {
const url = document.getElementById("api-url-input").value.trim();
if (!url.startsWith("https://")) return toast("請輸入正確的 https:// 網址");
state.apiUrl = url;
localStorage.setItem("apiUrl", url);
document.getElementById("api-url-input").style.display = "none";
document.getElementById("api-save-btn").style.display = "none";
document.getElementById("api-change-btn").style.display = "block";
document.getElementById("api-saved-badge").classList.add("show");
toast("✅ API 網址已儲存");
}

function initApiUI() {
if (state.apiUrl) {
document.getElementById("api-saved-badge").classList.add("show");
document.getElementById("api-url-input").style.display = "none";
document.getElementById("api-save-btn").style.display = "none";
document.getElementById("api-change-btn").style.display = "block";
} else {
document.getElementById("api-saved-badge").classList.remove("show");
document.getElementById("api-url-input").style.display = "block";
document.getElementById("api-save-btn").style.display = "block";
document.getElementById("api-change-btn").style.display = "none";
document.getElementById("api-fields").classList.add("show");
}
}

// ══ 使用者 ══
function getUsers() { return JSON.parse(localStorage.getItem("users") || "[]"); }
function saveUsers(u) { localStorage.setItem("users", JSON.stringify(u)); }

function renderUsers() {
const users = getUsers();
const list = document.getElementById("user-list");
list.innerHTML = "";
if (!users.length) {
list.innerHTML = '<p style="color:var(--muted);font-size:14px;margin-bottom:12px">尚無使用者，請新增</p>';
return;
}
users.forEach(u => {
const div = document.createElement("div");
div.className = "user-item" + (state.currentUser === u ? " selected" : "");
div.innerHTML = `
<div style="display:flex;align-items:center">
<div class="user-avatar">${u[0].toUpperCase()}</div>
<div>
<div class="user-name">${u}</div>
<div class="user-meta">${state.currentUser === u ? "✅ 目前使用中" : "點擊選擇"}</div>
</div>
</div>
<button class="user-del" onclick="deleteUser('${u}',event)">🗑</button>`;
div.onclick = () => selectUser(u);
list.appendChild(div);
});
}

function selectUser(name) {
state.currentUser = name;
localStorage.setItem("currentUser", name);
document.getElementById("header-user").textContent = "使用者：" + name;
document.getElementById("scan-user-display").textContent = name;
renderUsers();
toast("已選擇：" + name);
}

function addUser() {
const input = document.getElementById("new-user-input");
const name = input.value.trim();
if (!name) return toast("請輸入使用者名稱");
const users = getUsers();
if (users.includes(name)) return toast("使用者已存在");
users.push(name); saveUsers(users);
input.value = ""; renderUsers(); selectUser(name);
}

function deleteUser(name, e) {
e.stopPropagation();
if (!confirm(`確定刪除「${name}」？`)) return;
saveUsers(getUsers().filter(u => u !== name));
if (state.currentUser === name) {
state.currentUser = null; localStorage.removeItem("currentUser");
document.getElementById("header-user").textContent = "請先選擇使用者";
}
renderUsers();
}

function goToScan() {
if (!state.currentUser) return toast("⚠️ 請先選擇使用者");
if (!state.apiUrl) return toast("⚠️ 請先設定 API 網址（點進階設定）");
showScreen("scan");
}

// ══ QR 掃描 ══
let qrStream = null, qrInterval = null, qrDetected = false;

async function initQRScanner() {
qrDetected = false;
document.getElementById("qr-result").classList.remove("show");
document.getElementById("btn-confirm-scan").disabled = true;
document.getElementById("scan-qr-display").textContent = "等待掃描…";
document.getElementById("scan-time-display").textContent = "—";
if (!window.jsQR) await loadScript("https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js");
try {
if (qrStream) qrStream.getTracks().forEach(t => t.stop());
qrStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
const video = document.getElementById("qr-video");
video.srcObject = qrStream; video.play();
clearInterval(qrInterval);
const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");
qrInterval = setInterval(() => {
if (qrDetected || video.readyState !== video.HAVE_ENOUGH_DATA) return;
canvas.width = video.videoWidth; canvas.height = video.videoHeight;
ctx.drawImage(video, 0, 0);
const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
if (code) { qrDetected = true; onQRDetected(code.data); }
}, 300);
} catch(err) { toast("無法開啟相機：" + err.message); }
}

function onQRDetected(code) {
state.scannedCode = code;
state.scannedTime = new Date().toLocaleString("zh-TW");
state.currentRowId = "R" + Date.now();
document.getElementById("qr-result").classList.add("show");
document.getElementById("qr-code-display").textContent = code;
document.getElementById("scan-qr-display").textContent = code;
document.getElementById("scan-time-display").textContent = state.scannedTime;
document.getElementById("btn-confirm-scan").disabled = false;
if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
toast("✅ 掃描成功！");
}

function resetScan() {
qrDetected = false;
document.getElementById("qr-result").classList.remove("show");
document.getElementById("btn-confirm-scan").disabled = true;
document.getElementById("scan-qr-display").textContent = "等待掃描…";
document.getElementById("scan-time-display").textContent = "—";
state.scannedCode = null;
}

async function confirmScan() {
if (!state.scannedCode) return;
toast("記錄中…");
try {
const res = await fetch(state.apiUrl, {
method: "POST",
body: JSON.stringify({ action: "addRecord", user: state.currentUser, qrCode: state.scannedCode, timestamp: state.scannedTime, rowId: state.currentRowId }),
});
const data = await res.json();
if (!data.success) throw new Error(data.error);
toast("✅ 已記錄！前往錄影");
stopQRScanner();
showScreen("record");
document.getElementById("rec-qr-top").textContent = state.scannedCode;
} catch(err) { toast("❌ 記錄失敗：" + err.message); }
}

function stopQRScanner() {
clearInterval(qrInterval);
if (qrStream) { qrStream.getTracks().forEach(t => t.stop()); qrStream = null; }
}

// ══ 錄影設定 ══
function setQuality(q) {
state.quality = q;
document.getElementById("btn-720p").classList.toggle("active", q === "720p");
document.getElementById("btn-1080p").classList.toggle("active", q === "1080p");
if (!isRecording) initRecordCamera();
}
function setFps(fps) {
state.fps = fps;
document.getElementById("btn-30fps").classList.toggle("active", fps === 30);
document.getElementById("btn-60fps").classList.toggle("active", fps === 60);
if (!isRecording) initRecordCamera();
}

// ══ 錄影 ══
let recStream = null, mediaRecorder = null, recChunks = [];
let recTimerInterval = null, recSeconds = 0, isRecording = false;

function getVideoConstraints() {
const h = state.quality === "1080p" ? 1080 : 720;
const w = state.quality === "1080p" ? 1920 : 1280;
return { facingMode: state.facingMode, width: { ideal: w }, height: { ideal: h }, frameRate: { ideal: state.fps } };
}

async function initRecordCamera() {
try {
if (recStream) recStream.getTracks().forEach(t => t.stop());
recStream = await navigator.mediaDevices.getUserMedia({ video: getVideoConstraints(), audio: true });
const video = document.getElementById("rec-video");
video.srcObject = recStream; video.play();
} catch(err) { toast("無法開啟相機：" + err.message); }
}

async function flipCamera() {
state.facingMode = state.facingMode === "environment" ? "user" : "environment";
await initRecordCamera();
toast(state.facingMode === "environment" ? "後鏡頭" : "前鏡頭");
}

function toggleRecording() {
if (!isRecording) startRecording(); else stopRecording();
}

function startRecording() {
if (!recStream) return toast("相機未就緒");
recChunks = []; recSeconds = 0; isRecording = true;
document.getElementById("rec-timer-display").textContent = "00:00";
document.querySelectorAll(".setting-btn").forEach(b => b.style.opacity = "0.35");
const mimeType = MediaRecorder.isTypeSupported("video/mp4") ? "video/mp4"
: MediaRecorder.isTypeSupported("video/webm;codecs=vp8") ? "video/webm;codecs=vp8" : "video/webm";
mediaRecorder = new MediaRecorder(recStream, { mimeType });
mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
mediaRecorder.onstop = handleRecordingStop;
mediaRecorder.start(1000);
document.getElementById("rec-indicator").classList.add("show");
document.getElementById("rec-shutter-inner").classList.add("recording");
recTimerInterval = setInterval(() => {
recSeconds++;
const m = String(Math.floor(recSeconds/60)).padStart(2,"0");
const s = String(recSeconds%60).padStart(2,"0");
document.getElementById("rec-timer-display").textContent = `${m}:${s}`;
}, 1000);
}

function stopRecording() {
isRecording = false;
clearInterval(recTimerInterval);
document.getElementById("rec-indicator").classList.remove("show");
document.getElementById("rec-shutter-inner").classList.remove("recording");
document.querySelectorAll(".setting-btn").forEach(b => b.style.opacity = "1");
if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
}

async function handleRecordingStop() {
const mimeType = recChunks[0]?.type || "video/mp4";
const ext = mimeType.includes("mp4") ? "mp4" : "webm";
const blob = new Blob(recChunks, { type: mimeType });
const job = { id: state.currentRowId, qrCode: state.scannedCode, status: "uploading", progress: 0, blob, mimeType, ext };
uploadQueue.push(job);
updateUploadQueueUI();
uploadInBackground(job);
document.getElementById("done-qr").textContent = state.scannedCode;
document.getElementById("done-user").textContent = state.currentUser;
document.getElementById("done-time").textContent = state.scannedTime;
const badge = document.getElementById("done-video-badge");
badge.textContent = "⏳ 上傳中"; badge.style.background = "#fef3c7"; badge.style.color = "#92400e";
stopRecordStream();
showScreen("done");
}

// ══ 分塊上傳（縮小到 200KB 安全範圍）══
const CHUNK_SIZE = 200 * 1024;

async function uploadInBackground(job) {
try {
const arrayBuffer = await job.blob.arrayBuffer();
const bytes = new Uint8Array(arrayBuffer);
const chunks = [];
for (let i = 0; i < bytes.length; i += CHUNK_SIZE) {
const slice = bytes.subarray(i, i + CHUNK_SIZE);
let binary = "";
for (let j = 0; j < slice.length; j++) binary += String.fromCharCode(slice[j]);
chunks.push(btoa(binary));
}
const totalChunks = chunks.length;
job.progress = 3; updateUploadQueueUI();

for (let i = 0; i < totalChunks; i++) {
let retries = 3;
while (retries > 0) {
try {
const res = await fetch(state.apiUrl, {
method: "POST",
body: JSON.stringify({ action: "uploadChunk", rowId: job.id, chunkIndex: i, totalChunks, chunkData: chunks[i], mimeType: job.mimeType, qrCode: job.qrCode, ext: job.ext }),
});
const data = await res.json();
if (!data.success) throw new Error(data.error);
break;
} catch(e) {
retries--;
if (retries === 0) throw e;
await new Promise(r => setTimeout(r, 1500));
}
}
job.progress = Math.round(3 + (i + 1) / totalChunks * 87);
updateUploadQueueUI();
}

job.progress = 92; updateUploadQueueUI();
const finalRes = await fetch(state.apiUrl, {
method: "POST",
body: JSON.stringify({ action: "finalizeUpload", rowId: job.id }),
});
const finalData = await finalRes.json();
if (!finalData.success) throw new Error(finalData.error);

job.status = "done"; job.progress = 100;
updateUploadQueueUI();
toast("✅ " + job.qrCode + " 上傳完成！");
if (document.getElementById("done-qr").textContent === job.qrCode) {
const badge = document.getElementById("done-video-badge");
badge.textContent = "✅ 已上傳"; badge.style.background = "#ecfdf5"; badge.style.color = "#065f46";
}
} catch(err) {
job.status = "error"; updateUploadQueueUI();
toast("❌ " + job.qrCode + " 失敗：" + err.message, 4000);
}
}

function updateUploadQueueUI() {
const active = uploadQueue.filter(j => j.status === "uploading");
const btn = document.getElementById("upload-queue-btn");
document.getElementById("upload-queue-count").textContent = active.length;
btn.classList.toggle("show", uploadQueue.length > 0);
const list = document.getElementById("upload-list");
list.innerHTML = "";
[...uploadQueue].reverse().forEach(job => {
const icon = job.status === "done" ? "✅" : job.status === "error" ? "❌" : "⬆️";
const statusText = job.status === "done" ? "上傳完成" : job.status === "error" ? "上傳失敗，請重試" : `上傳中 ${job.progress}%`;
const div = document.createElement("div");
div.className = "upload-item";
div.innerHTML = `
<div class="upload-status-icon">${icon}</div>
<div class="upload-item-info">
<div class="upload-item-name">${job.qrCode}</div>
<div class="upload-item-status">${statusText}</div>
${job.status === "uploading" ? `<div class="upload-item-bar"><div class="upload-item-bar-fill" style="width:${job.progress}%"></div></div>` : ""}
</div>`;
list.appendChild(div);
});
}

function toggleUploadPanel() { document.getElementById("upload-panel").classList.toggle("show"); }
function closeUploadPanel(e) { if (e.target === document.getElementById("upload-panel")) toggleUploadPanel(); }
function stopRecordStream() { if (recStream) { recStream.getTracks().forEach(t => t.stop()); recStream = null; } }

function cancelRecord() {
if (isRecording) stopRecording(); else stopRecordStream();
document.getElementById("rec-indicator").classList.remove("show");
document.getElementById("rec-shutter-inner").classList.remove("recording");
showScreen("scan"); resetScan(); initQRScanner();
}

function startOver() {
state.scannedCode = null; state.scannedTime = null; state.currentRowId = null;
showScreen("scan"); resetScan(); initQRScanner();
}

function loadScript(src) {
return new Promise((res, rej) => {
const s = document.createElement("script");
s.src = src; s.onload = res; s.onerror = rej; document.head.appendChild(s);
});
}

(function init() {
if (state.currentUser) {
document.getElementById("header-user").textContent = "使用者：" + state.currentUser;
document.getElementById("scan-user-display").textContent = state.currentUser;
}
initApiUI();
renderUsers();
})();
</script>
